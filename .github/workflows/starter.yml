name: starter

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  starter:
    runs-on: ubuntu-latest

    env:
      FB_TOKEN: ${{ secrets.FB_TOKEN }}

    steps:
      # -------------------------------------------------------------
      # CHECKOUT
      # -------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v7

      # -------------------------------------------------------------
      # PYTHON
      # -------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      # -------------------------------------------------------------
      # INSTALL PYTHON DEPENDENCIES
      # -------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --disable-pip-version-check -r requirements.txt

      # -------------------------------------------------------------
      # EXECUTION OF MAIN
      # -------------------------------------------------------------
      - name: Main
        run: python main.py
        continue-on-error: true # in case of error, the workflow will continue to commit changes

      # -------------------------------------------------------------
      # AUTO COMMIT (GitHub Actions)
      # -------------------------------------------------------------
      - name: Debug - Show git status
        run: |
          echo "=== Git Status ==="
          git status
          echo "=== Git Diff (configs.yml) ==="
          git diff configs.yml || true
          echo "=== Tracked log files ==="
          ls -la logs/ || true

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update"
          file_pattern: "logs/* configs.yml"
          